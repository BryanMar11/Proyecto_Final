<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider-Verse - Gestión de Personajes</title>
    <!-- Si tu archivo está dentro de la carpeta css, usa esta ruta. Si está suelto, quita el "css/" -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- 1. BARRA DE NAVEGACIÓN -->
    <nav class="navbar">
        <div class="nav-brand">🕸️ Spider-Verse</div>
        <ul class="nav-links">
            <li><a href="#" class="active">Inicio</a></li>
            <li><a href="#">Personajes</a></li>
            <li><a href="#">Noticias</a></li>
        </ul>
    </nav>

    <!-- 2. CABECERA PRINCIPAL Y BOTONES DE FILTRO -->
    <header class="main-header">
        <h1>Gestión de Personajes del Multiverso</h1>
        <div class="botones-orden">
            <button id="btn-ordenar-nombre">Ordenar por Nombre</button>
            <button id="btn-ordenar-edad">Ordenar por Edad</button>
        </div>
    </header>

    <!-- 3. SECCIÓN DEL FORMULARIO -->
    <section class="form-section">
        <h2 class="section-title title-form">AGREGAR NUEVO PERSONAJE</h2>
        <p class="construction-text">Formulario en construcción...</p>
    </section>

    <!-- 4. SECCIÓN PRINCIPAL DE TARJETAS -->
    <main class="characters-section">
        <h2 class="section-title title-list">LISTA DE PERSONAJES</h2>
        
        <!-- Contenedor donde se inyectará todo desde el JS -->
        <div id="contenedor-tarjetas" class="cards-grid"></div>
    </main>

    <!-- Enlace a tu script de JS -->
    <script src="js/app.js"></script>
</body>
</html>
